<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulex - Escaneamento</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .camera-box { width: 90%; max-width: 400px; background: #fff; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .scanner-visual { width: 100%; height: 200px; background: #333; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 4px solid #0056b3; position: relative; overflow: hidden; }
        .scanner-visual::after { content: ""; position: absolute; width: 100%; height: 2px; background: #00ff00; top: 0; left: 0; animation: scan 2s infinite linear; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        input[type="number"] { width: 80%; padding: 12px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        button { background: #0056b3; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; width: 85%; }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="camera-box">
        <h1>Simulador Bulex</h1>
        <div class="scanner-visual">
             <span style="color: white; font-size: 3rem;">📷</span>
        </div>
        <p><strong>Contexto:</strong> O usuário aponta a câmera para o QR Code da prescrição.</p>
        
        <form id="scanForm">
            <input type="number" id="medId" placeholder="Digite o ID (Ex: 1 ou 2)" required>
            <button type="submit">Simular Leitura de QR Code</button>
        </form>
        
        <p style="margin-top: 20px; font-style: italic;">
            * Este campo substitui a leitura automática da câmera neste protótipo funcional.
        </p>
    </div>

    <script>
        document.getElementById('scanForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('medId').value;
            window.location.href = '/medicamento/' + id;
        };
    </script>
</body>
</html>
